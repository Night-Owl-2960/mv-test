  // m27: F#3♩. | G3♩.
  { voice:"flute", freq:185.00, beat:90,   dur:1.5 },
  { voice:"flute", freq:196.00, beat:91.5, dur:1.5 },

  // m28: F#3♩. | E3♩.
  { voice:"flute", freq:185.00, beat:93,   dur:1.5 },
  { voice:"flute", freq:164.81, beat:94.5, dur:1.5 },

  // m29: D3♩..
  { voice:"flute", freq:146.83, beat:96,   dur:3 },

  // m30: D3○
  { voice:"flute", freq:146.83, beat:99,   dur:4 },

  // エンディングベース
  { voice:"cello", freq:73.42,  beat:84, dur:3 }, // D2 m25
  { voice:"cello", freq:55.00,  beat:87, dur:3 }, // A1 m26
  { voice:"cello", freq:73.42,  beat:90, dur:3 }, // D2 m27
  { voice:"cello", freq:55.00,  beat:93, dur:3 }, // A1 m28
  { voice:"cello", freq:73.42,  beat:96, dur:3 }, // D2 m29
  { voice:"cello", freq:73.42,  beat:99, dur:4 }, // D2 m30

  // エンディングハープ
  { voice:"harp", freq:146.83, beat:84,   dur:0.5 }, // D3
  { voice:"harp", freq:185.00, beat:84.5, dur:0.5 }, // F#3
  { voice:"harp", freq:220.00, beat:85,   dur:0.5 }, // A3
  { voice:"harp", freq:146.83, beat:87,   dur:0.5 }, // D3
  { voice:"harp", freq:185.00, beat:87.5, dur:0.5 }, // F#3
  { voice:"harp", freq:220.00, beat:88,   dur:0.5 }, // A3

];

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

function applyADSR(gainNode, startTime, attack, decay, sustain, release, duration, volume) {
  const g = gainNode.gain;
  g.cancelScheduledValues(startTime);
  g.setValueAtTime(0.0001, startTime);
  g.linearRampToValueAtTime(volume, startTime + attack);
  g.linearRampToValueAtTime(volume * sustain + 0.0001, startTime + attack + decay);
  g.setValueAtTime(volume * sustain + 0.0001, startTime + duration);
  g.exponentialRampToValueAtTime(0.0001, startTime + duration + release);
}

function playFlute(ctx, freq, startTime, duration) {
  const attack  = 0.03;
  const decay   = 0.1;
  const sustain = 0.75;
  const release = 0.4;
  const volume  = 0.28;  // 倍音加算込みで最終的に約0.4相当

  const osc1 = ctx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = freq;

  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;

  const harmGain = ctx.createGain();
  harmGain.gain.value = 0.25;

  const env = ctx.createGain();
  // ctx.currentTime ではなく startTime 基点で統一する
  env.gain.value = 0.0001;
  env.gain.setValueAtTime(0.0001, startTime);
  env.gain.linearRampToValueAtTime(volume, startTime + attack);
  env.gain.linearRampToValueAtTime(
    volume * sustain + 0.0001,
    startTime + attack + decay
  );
  env.gain.setValueAtTime(
    volume * sustain + 0.0001,
    startTime + duration
  );
  env.gain.exponentialRampToValueAtTime(
    0.0001,
    startTime + duration + release
  );

  osc1.connect(env);
  osc2.connect(harmGain);
  harmGain.connect(env);
  env.connect(masterGainNode);

  const stopTime = startTime + duration + release + 0.05;
  osc1.start(startTime); osc1.stop(stopTime);
  osc2.start(startTime); osc2.stop(stopTime);
}

function playStrings(ctx, freq, startTime, duration) {
  const gain = ctx.createGain();
  gain.connect(masterGainNode);
  applyADSR(gain, startTime, 0.08, 0.2, 0.7, 0.5, duration, 0.35);

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(800, startTime);
  filter.Q.setValueAtTime(1.5, startTime);
  filter.connect(gain);

  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, startTime);
  osc.connect(filter);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.5 + 0.01);
}

function playCello(ctx, freq, startTime, duration) {
  const gain = ctx.createGain();
  gain.connect(masterGainNode);
  applyADSR(gain, startTime, 0.03, 0.1, 0.75, 0.5, duration, 0.45);

  const peaking = ctx.createBiquadFilter();
  peaking.type = 'peaking';
  peaking.frequency.setValueAtTime(120, startTime);
  peaking.gain.setValueAtTime(2, startTime);
  peaking.Q.setValueAtTime(2, startTime);

  const highshelf = ctx.createBiquadFilter();
  highshelf.type = 'highshelf';
  highshelf.frequency.setValueAtTime(600, startTime);
  highshelf.gain.setValueAtTime(-8, startTime);

  peaking.connect(highshelf);
  highshelf.connect(gain);

  const osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, startTime);
  osc.connect(peaking);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.3 + 0.01);
}

function playHarp(ctx, freq, startTime, duration) {
  const attack  = 0.015;
  const release = 0.8;

  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const osc3 = ctx.createOscillator();
  osc1.type = "sine"; osc1.frequency.value = freq;
  osc2.type = "sine"; osc2.frequency.value = freq * 2;
  osc3.type = "sine"; osc3.frequency.value = freq * 3;

  const g2 = ctx.createGain(); g2.gain.value = 0.2;
  const g3 = ctx.createGain(); g3.gain.value = 0.1;

  const env = ctx.createGain();
  env.gain.value = 0.0001;
  env.gain.setValueAtTime(0.0001, startTime);
  env.gain.linearRampToValueAtTime(0.4, startTime + attack);
  env.gain.linearRampToValueAtTime(0.0001, startTime + attack + release);

  osc1.connect(env);
  osc2.connect(g2); g2.connect(env);
  osc3.connect(g3); g3.connect(env);
  env.connect(masterGainNode);

  const stopTime = startTime + attack + release + 0.05;
  osc1.start(startTime); osc1.stop(stopTime);
  osc2.start(startTime); osc2.stop(stopTime);
  osc3.start(startTime); osc3.stop(stopTime);
}

// 進行バー用
let rafId = null;
let seqStartTime = null;
const TOTAL_BEATS = 103;

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function updateProgressBar() {
  if (!ctx || !seqStartTime) return;
  const elapsed = ctx.currentTime - seqStartTime;
  const totalSec = TOTAL_BEATS * BEAT;
  const pct = Math.min(elapsed / totalSec, 1.0) * 100;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = formatTime(elapsed);
  document.getElementById('time-total').textContent = formatTime(totalSec);
  if (pct < 100) {
    rafId = requestAnimationFrame(updateProgressBar);
  }
}

// クリックでシーク（指定位置から再生）
document.getElementById('progress-bar-bg').addEventListener('click', async function(e) {
  if (!seqStartTime) return;
  const rect = this.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const seekBeat = ratio * TOTAL_BEATS;

  // いったん停止して再初期化
  if (ctx) { await ctx.close(); ctx = null; }
  ctx = new AudioContext();
  masterGainNode = ctx.createGain();
  masterGainNode.gain.setValueAtTime(0.55, ctx.currentTime);
  masterGainNode.connect(ctx.destination);

  // seekBeat以降の音符だけ鳴らす
  const startTime = ctx.currentTime + 0.1;
  seqStartTime = startTime - seekBeat * BEAT;
  score.forEach(note => {
    const t = startTime + (note.beat - seekBeat) * BEAT;
    const d = note.dur * BEAT;
    if (t < ctx.currentTime) return;
    switch (note.voice) {
      case "flute":   playFlute(ctx, note.freq, t, d);   break;
      case "harp":    playHarp(ctx, note.freq, t, d);    break;
      case "cello":   playCello(ctx, note.freq, t, d);   break;
      case "strings": playStrings(ctx, note.freq, t, d); break;
    }
  });

  // シーク時のフェードアウト
  const fadeStartBeat = 99;
  const fadeEndBeat   = 103.7;
  const fadeSt = startTime + (fadeStartBeat - seekBeat) * BEAT;
  const fadeEd = startTime + (fadeEndBeat   - seekBeat) * BEAT;
  if (fadeEd > ctx.currentTime) {
    masterGainNode.gain.setValueAtTime(
      0.55, Math.max(fadeSt, ctx.currentTime + 0.01)
    );
    masterGainNode.gain.exponentialRampToValueAtTime(
      0.0001, fadeEd
    );
  }

  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(updateProgressBar);
});

function startSequencer(ctx) {
  const startTime = ctx.currentTime + 0.1;
  seqStartTime = startTime;
  score.forEach(note => {
    const t = startTime + note.beat * BEAT;
    const d = note.dur * BEAT;
    switch (note.voice) {
      case "flute":   playFlute(ctx, note.freq, t, d);   break;
      case "harp":    playHarp(ctx, note.freq, t, d);    break;
      case "cello":   playCello(ctx, note.freq, t, d);   break;
      case "strings": playStrings(ctx, note.freq, t, d); break;
    }
  });

  // m30（beat99）からフェードアウト開始
  const fadeStartBeat = 99;
  const fadeEndBeat   = 103.7;
  const fadeStart = startTime + fadeStartBeat * BEAT;
  const fadeEnd   = startTime + fadeEndBeat   * BEAT;
  masterGainNode.gain.setValueAtTime(0.55, fadeStart);
  masterGainNode.gain.exponentialRampToValueAtTime(
    0.0001, fadeEnd
  );

  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(updateProgressBar);
  const total = (103 * BEAT + 0.5 + 0.1) * 1000;
  setTimeout(resetButtons, total);
}

function resetButtons() {
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

async function onPlay() {
  if (ctx) { await ctx.close(); ctx = null; }
  ctx = new AudioContext();
  masterGainNode = ctx.createGain();
  masterGainNode.gain.setValueAtTime(0.55, ctx.currentTime);
  masterGainNode.connect(ctx.destination);
  startSequencer(ctx);
  document.getElementById('btn-play').disabled = true;
  document.getElementById('btn-stop').disabled = false;
}

async function onStop() {
  try {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (ctx) { await ctx.close(); ctx = null; masterGainNode = null; }
    seqStartTime = null;
    document.getElementById('progress-bar-fill').style.width = '0%';
    document.getElementById('time-current').textContent = '0:00';
    resetButtons();
  } catch (e) {
    showError('停止エラー: ' + e);
  }
}
</script>
